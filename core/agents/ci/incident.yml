name: "Incident Agent"

on:
  workflow_run:
    workflows: ["*"]
    types: [completed]
    branches: [main]

jobs:
  analyze-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Get failure logs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Incident Agent"
          echo "==============="
          echo "Failed workflow: ${{ github.event.workflow_run.name }}"
          echo "Run ID: ${{ github.event.workflow_run.id }}"
          echo "Branch: ${{ github.event.workflow_run.head_branch }}"
          echo ""
          echo "This workflow will:"
          echo "  1. Fetch logs from the failed workflow run"
          echo "  2. Analyze failure patterns via LLM"
          echo "  3. Suggest fixes based on error messages"
          echo "  4. Create a GitHub issue with analysis and suggested fix"
          echo "  5. Tag the issue with 'incident' and 'automated'"

      - name: Analyze and create issue
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Configure LLM provider in .enterprise.yml"
          echo "Set LLM_API_KEY secret in GitHub repository settings"
