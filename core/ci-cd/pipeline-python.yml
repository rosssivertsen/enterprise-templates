# Python CI/CD Pipeline
# Copy this to .github/workflows/ci-cd.yml in your Python project
# Lifecycle: quality-gates → deploy-staging → e2e-tests → deploy-production → branch-sync → release

name: Python CI/CD Pipeline

on:
  push:
    branches: [main, staging, development]
  pull_request:
    branches: [main, staging, development]

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ──────────────────────────────────────────────
  # Setup: Install dependencies
  # ──────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f setup.py ]; then pip install -e .; fi
          if [ -f pyproject.toml ]; then pip install -e ".[dev]" 2>/dev/null || true; fi

  # ──────────────────────────────────────────────
  # Stage 1: Quality Gates
  # ──────────────────────────────────────────────
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f setup.py ]; then pip install -e .; fi
          if [ -f pyproject.toml ]; then pip install -e ".[dev]" 2>/dev/null || true; fi
          pip install flake8 ruff mypy pip-audit bandit pytest pytest-cov

      - name: Lint (flake8)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy . --ignore-missing-imports || echo "mypy check completed with warnings"

      - name: Security audit (pip-audit)
        run: pip-audit || echo "pip-audit completed with warnings"

      - name: Security audit (bandit)
        run: bandit -r . -x ./tests --severity-level medium || echo "bandit completed with warnings"

      - name: Unit tests with coverage
        run: |
          pytest --cov --cov-report=xml --cov-report=term --cov-fail-under=80

      - name: Documentation check
        run: |
          echo "Verifying documentation..."
          test -f README.md || echo "Warning: README.md not found"
          test -f CHANGELOG.md || echo "Warning: CHANGELOG.md not found"
          echo "Documentation check completed"

  # ──────────────────────────────────────────────
  # Stage 2: Deploy to Staging
  # ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: quality-gates
    if: github.event_name == 'push' && (github.ref == 'refs/heads/development' || github.ref == 'refs/heads/staging')
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Deploy to staging
        run: |
          echo "Deploying Python application to staging environment..."
          # Add staging deployment commands here
          echo "Staging deployment completed"

  # ──────────────────────────────────────────────
  # Stage 3: E2E Tests (against staging)
  # ──────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && (github.ref == 'refs/heads/development' || github.ref == 'refs/heads/staging')
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest

      - name: Run E2E tests against staging
        run: |
          pytest tests/e2e/ -v --tb=short
        env:
          TEST_ENV: staging

  # ──────────────────────────────────────────────
  # Stage 4: Deploy to Production
  # ──────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: quality-gates
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Deploy to production
        run: |
          echo "Deploying Python application to production environment..."
          # Add production deployment commands here
          echo "Production deployment completed"

  # ──────────────────────────────────────────────
  # Stage 5: Branch Sync (main → staging → dev)
  # ──────────────────────────────────────────────
  branch-sync:
    name: Branch Sync
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Sync main → staging
        run: |
          echo "Syncing main into staging..."
          if git show-ref --verify --quiet refs/remotes/origin/staging; then
            git fetch origin staging:staging
            git checkout staging
            git merge --no-ff main -m "chore: merge main into staging [skip ci]"
            git push origin staging
            echo "Staging branch updated with main"
          else
            echo "Staging branch does not exist, skipping"
          fi

      - name: Sync main → development
        run: |
          echo "Syncing main into development..."
          if git show-ref --verify --quiet refs/remotes/origin/development; then
            git fetch origin development:development
            git checkout development
            git merge --no-ff main -m "chore: merge main into development [skip ci]"
            git push origin development
            echo "Development branch updated with main"
          else
            echo "Development branch does not exist, skipping"
          fi

  # ──────────────────────────────────────────────
  # Stage 6: Release (date-based tag)
  # ──────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Create date-based release tag
        run: |
          DATE_TAG="release-$(date +'%Y-%m-%d')"
          FINAL_TAG="$DATE_TAG"
          COUNTER=1
          while git rev-parse "$FINAL_TAG" >/dev/null 2>&1; do
            FINAL_TAG="${DATE_TAG}.${COUNTER}"
            COUNTER=$((COUNTER + 1))
          done
          git tag -a "$FINAL_TAG" -m "Release $FINAL_TAG"
          git push origin "$FINAL_TAG"
          echo "Created release tag: $FINAL_TAG"
